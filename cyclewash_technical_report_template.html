<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CycleWash Technical Evaluation</title>
  <style>
    :root { color-scheme: dark light; font-family: Arial, Helvetica, sans-serif; background: #e5e7eb; color: #18212f; }
    * { box-sizing: border-box; }
    body { margin: 0; background: #e5e7eb; line-height: 1.5; }
    button, select, input { font: inherit; }
    .viewer-shell { background: #101722; color: #edf2f7; padding: 20px max(20px, calc((100vw - 1200px) / 2)); }
    .viewer-header { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .viewer-header h2 { margin: 0; font-size: 1.25rem; }
    .provenance { color: #a7f3d0; font-size: .9rem; }
    .viewer-grid { display: grid; grid-template-columns: minmax(0, 1fr) 280px; gap: 16px; margin-top: 14px; }
    .scene-wrap { min-height: 460px; position: relative; border: 1px solid #334155; background: #080d15; }
    #scene { display: block; width: 100%; height: 100%; min-height: 460px; outline: none; }
    .scene-label { position: absolute; left: 12px; bottom: 10px; margin: 0; color: #cbd5e1; font-size: .8rem; pointer-events: none; }
    .controls, .metrics { border: 1px solid #334155; padding: 12px; background: #162131; }
    .controls { display: grid; gap: 12px; align-content: start; }
    .scenario-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .scenario-selector button, #play-pause { border: 1px solid #64748b; background: #223046; color: #edf2f7; padding: 8px 10px; cursor: pointer; }
    .scenario-selector button[aria-pressed="true"] { background: #0f766e; border-color: #5eead4; }
    .control-row { display: grid; gap: 5px; font-size: .9rem; }
    #phase-slider { width: 100%; }
    #speed-select { width: 100%; padding: 7px; background: #0f172a; color: #edf2f7; border: 1px solid #64748b; }
    .metrics { margin-top: 16px; display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
    .metric { border-left: 3px solid #38bdf8; padding-left: 8px; }
    .metric strong, .metric span { display: block; }
    .metric strong { color: #94a3b8; font-size: .75rem; text-transform: uppercase; letter-spacing: .04em; }
    .metric span { font-size: 1.05rem; }
    .technical-report { max-width: 1200px; margin: 0 auto; background: #fff; padding: 34px; }
    .report-header { border-bottom: 3px solid #0f766e; padding-bottom: 18px; }
    .eyebrow { color: #0f766e; font-size: .8rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
    h1, h2, h3 { color: #152231; line-height: 1.2; }
    h1 { font-size: 2rem; margin: 0; }
    h2 { margin-top: 34px; font-size: 1.4rem; }
    h3 { font-size: 1.05rem; margin-bottom: 8px; }
    .formula { border-top: 1px solid #cbd5e1; margin-top: 24px; padding-top: 14px; break-inside: avoid; }
    .equation { overflow-x: auto; background: #f1f5f9; border-left: 3px solid #0f766e; color: #172554; font-family: "Times New Roman", serif; font-size: 1.08rem; padding: 12px; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: .88rem; }
    th, td { padding: 7px 8px; text-align: left; vertical-align: top; border-bottom: 1px solid #cbd5e1; }
    thead th { background: #e2e8f0; color: #152231; }
    tbody th { color: #152231; }
    @media (max-width: 760px) {
      .viewer-shell { padding: 14px; }
      .viewer-grid { grid-template-columns: 1fr; }
      .scene-wrap, #scene { min-height: 360px; }
      .metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .technical-report { padding: 20px 14px; }
    }
    @media print {
      body { background: #fff; color: #111827; }
      .viewer-shell { background: #fff; color: #111827; padding: 0; }
      .viewer-grid, .scene-label { display: none; }
      .viewer-header h2, .provenance { color: #111827; }
      .metrics { border: 1px solid #64748b; color: #111827; }
      .technical-report { max-width: none; padding: 0; }
      .formula, section { break-inside: avoid; }
    }
  </style>
</head>
<body data-selected-scenario="@@SELECTED_SCENARIO@@" data-viewer-only="@@VIEWER_ONLY@@">
  <section class="viewer-shell" aria-labelledby="viewer-heading">
    <div class="viewer-header">
      <h2 id="viewer-heading">Fixed-scenario assembly playback</h2>
      <span class="provenance">Relative analytical load: animation color only, not solved FEA stress.</span>
    </div>
    <div class="viewer-grid">
      <div class="scene-wrap">
        <canvas id="scene" tabindex="0" aria-label="CycleWash 3D assembly viewer"></canvas>
        <p class="scene-label">Gravity-referenced water body with bounded schematic slosh. Door closed at 50% transparency.</p>
        <div id="water-body" hidden></div>
        <div id="imbalance-vector" hidden></div>
      </div>
      <div class="controls" aria-label="Playback controls">
        <div class="scenario-selector" id="scenario-selector" role="group" aria-label="Fixed operating scenario">
          <button type="button" data-scenario="Gentle">Gentle</button>
          <button type="button" data-scenario="Normal">Normal</button>
          <button type="button" data-scenario="Heavy">Heavy</button>
        </div>
        <div class="control-row"><label for="play-pause">Playback</label><button id="play-pause" type="button">Pause</button></div>
        <div class="control-row"><label for="phase-slider">Phase <output id="phase-output">0 deg</output></label><input id="phase-slider" type="range" min="0" max="360" value="0" step="1"></div>
        <div class="control-row"><label for="speed-select">Playback speed</label><select id="speed-select"><option value="0.25">0.25x</option><option value="0.5">0.5x</option><option value="1" selected>1x</option><option value="2">2x</option></select></div>
      </div>
    </div>
    <div class="metrics" id="scenario-metrics" aria-live="polite"></div>
    <p id="viewer-status" role="status" aria-live="polite" hidden></p>
  </section>
  @@REPORT_HTML@@
  <script id="cyclewash-report-data" type="application/json">@@PAYLOAD_JSON@@</script>
  <script>
@@THREE_BUNDLE@@
window.CycleWashThree = CycleWashThree;
  </script>
  <script>
  (function () {
    "use strict";
    const viewerStatus = document.getElementById("viewer-status");
    try {
    const payload = JSON.parse(document.getElementById("cyclewash-report-data").textContent);
    const runtime = window.CycleWashThree;
    if (!runtime || runtime.THREE_VERSION !== "0.185.1" || !runtime.THREE) {
      throw new Error("The embedded CycleWash Three.js runtime is missing or has an unexpected version.");
    }
    const THREE = runtime.THREE;
    const canvas = document.getElementById("scene");
    const metrics = document.getElementById("scenario-metrics");
    const phaseSlider = document.getElementById("phase-slider");
    const phaseOutput = document.getElementById("phase-output");
    const playPause = document.getElementById("play-pause");
    const speedSelect = document.getElementById("speed-select");
    const scenarioButtons = Array.from(document.querySelectorAll("[data-scenario]"));
    let selectedName = document.body.dataset.selectedScenario;
    let selected = payload.scenarios[selectedName];
    let playing = true;
    let speed = 1;
    let phase = 0;
    let previousTime = 0;

    const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: false });
    renderer.setClearColor(0x080d15, 1);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(38, 1, 0.01, 20);
    camera.position.set(1.15, 0.78, 1.25);
    camera.lookAt(0, 0, 0);
    const controls = new runtime.OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    scene.add(new THREE.HemisphereLight(0xcbd5e1, 0x172033, 2.2));
    const key = new THREE.DirectionalLight(0xffffff, 2.1); key.position.set(1.2, 1.3, 1.0); scene.add(key);
    const grid = new THREE.GridHelper(2.1, 16, 0x36516f, 0x1e293b); grid.rotation.z = Math.PI / 2; scene.add(grid);
    const origin = new THREE.Vector3().fromArray(payload.geometry.rotation_origin);
    const rotor = new THREE.Group(); rotor.position.copy(origin); scene.add(rotor);
    const rotatingMaterials = [];

    function decode(record, Type) {
      const binary = atob(record.base64); const bytes = new Uint8Array(binary.length);
      for (let index = 0; index < binary.length; index += 1) bytes[index] = binary.charCodeAt(index);
      return new Type(bytes.buffer);
    }
    payload.geometry.parts.forEach(function (part) {
      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute("position", new THREE.BufferAttribute(decode(part.geometry.positions, Float32Array), 3));
      geometry.setIndex(new THREE.BufferAttribute(decode(part.geometry.indices, Uint32Array), 1));
      geometry.computeVertexNormals();
      const material = new THREE.MeshStandardMaterial({ color: part.color, transparent: part.opacity < 1, opacity: part.opacity, roughness: 0.6, metalness: 0.15, side: THREE.DoubleSide });
      const mesh = new THREE.Mesh(geometry, material);
      if (part.rotating) { mesh.position.copy(origin).multiplyScalar(-1); rotor.add(mesh); rotatingMaterials.push(material); }
      else scene.add(mesh);
    });
    const water = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.16, 0.34), new THREE.MeshStandardMaterial({ color: 0x0ea5e9, transparent: true, opacity: 0.48, roughness: 0.25, metalness: 0.1 }));
    scene.add(water);
    const laundry = new THREE.Mesh(new THREE.SphereGeometry(0.035, 20, 12), new THREE.MeshStandardMaterial({ color: 0xf97316, roughness: 0.8 })); rotor.add(laundry);
    const radialDirection = new THREE.Vector3(0, 1, 0);
    const arrow = new THREE.ArrowHelper(radialDirection, new THREE.Vector3(), 0.15, 0xf43f5e, 0.035, 0.02); rotor.add(arrow);
    arrow.setDirection(radialDirection);

    function metric(label, value) { return "<div class=\"metric\"><strong>" + label + "</strong><span>" + value + "</span></div>"; }
    function updateMetrics() {
      metrics.innerHTML = metric("Scenario", selected.name) + metric("Speed", selected.rpm.toFixed(0) + " RPM") + metric("Wet laundry", selected.laundry_mass_kg.toFixed(1) + " kg") + metric("Imbalance force", selected.imbalance_force_n.toFixed(1) + " N") + metric("Water mass", selected.water_mass_kg.toFixed(1) + " kg") + metric("Shaft FoS", selected.factor_of_safety.toFixed(2)) + metric("Analytical load", selected.provenance) + metric("FEA", selected.fea_provenance || "Not attached");
    }
    function selectScenario(name) {
      selectedName = name; selected = payload.scenarios[name]; phase = 0; phaseSlider.value = "0";
      scenarioButtons.forEach(function (button) { button.setAttribute("aria-pressed", String(button.dataset.scenario === name)); });
      updateMetrics(); updateScene();
    }
    function updateScene() {
      const radians = phase * Math.PI / 180;
      rotor.rotation.x = radians;
      const eccentricity = selected.eccentricity_m;
      laundry.position.set(0, eccentricity, 0);
      const forceScale = Math.min(0.26, 0.06 + selected.imbalance_force_n / 800);
      arrow.position.copy(laundry.position);
      arrow.setLength(forceScale, 0.035, 0.02);
      water.scale.y = Math.max(0.28, selected.fill_fraction * 1.6);
      water.position.copy(origin).add(new THREE.Vector3(0, -selected.drum_radius_m * (0.52 - selected.fill_fraction / 3), 0));
      water.rotation.x = Math.sin(radians - Math.PI / 4) * (8 * Math.PI / 180);
      rotatingMaterials.forEach(function (material, index) { material.color.setHSL(0.05 + 0.53 * (0.5 + 0.5 * Math.sin(radians + index * 0.8)), 0.82, 0.52); });
      phaseOutput.value = phase.toFixed(0) + " deg"; phaseOutput.textContent = phaseOutput.value;
    }
    function resize() { const rect = canvas.getBoundingClientRect(); renderer.setSize(rect.width, rect.height, false); camera.aspect = rect.width / rect.height; camera.updateProjectionMatrix(); }
    function setPlaying(nextPlaying) { playing = Boolean(nextPlaying); playPause.textContent = playing ? "Pause" : "Play"; }
    scenarioButtons.forEach(function (button) { button.addEventListener("click", function () { selectScenario(button.dataset.scenario); }); });
    playPause.addEventListener("click", function () { setPlaying(!playing); });
    phaseSlider.addEventListener("input", function () { setPlaying(false); phase = Number(phaseSlider.value); updateScene(); });
    speedSelect.addEventListener("change", function () { speed = Number(speedSelect.value); });
    canvas.addEventListener("keydown", function (event) { if (event.key === " ") { event.preventDefault(); playPause.click(); } });
    function frame(time) { if (previousTime) { const elapsed = Math.min(0.1, (time - previousTime) / 1000); if (playing) { phase = (phase + elapsed * selected.rpm * 6 * speed) % 360; phaseSlider.value = phase.toFixed(0); updateScene(); } } previousTime = time; resize(); controls.update(); renderer.render(scene, camera); requestAnimationFrame(frame); }

    function smokeAssert(condition, message) { if (!condition) throw new Error("Viewer smoke check failed: " + message); }
    function runRuntimeSmokeTest() {
      const original = { selectedName: selectedName, playing: playing, phase: phase, speed: speed };
      const heavyButton = scenarioButtons.find(function (button) { return button.dataset.scenario === "Heavy"; });
      smokeAssert(Boolean(heavyButton), "Heavy scenario control is missing");
      heavyButton.click();
      smokeAssert(selectedName === "Heavy", "scenario control did not select Heavy");
      playPause.click();
      smokeAssert(playing !== original.playing, "play/pause control did not toggle playback");
      phaseSlider.value = "137";
      phaseSlider.dispatchEvent(new Event("input"));
      smokeAssert(phase === 137 && !playing, "phase control did not scrub and pause");
      speedSelect.value = "2";
      speedSelect.dispatchEvent(new Event("change"));
      smokeAssert(speed === 2, "speed control did not select 2x");

      selectScenario(original.selectedName);
      phase = original.phase;
      phaseSlider.value = String(original.phase);
      speed = original.speed;
      speedSelect.value = String(original.speed);
      setPlaying(original.playing);
      updateScene();
      return true;
    }

    window.CycleWashTechnicalViewer = Object.freeze({
      getState: function () { return { selectedName: selectedName, playing: playing, phase: phase, speed: speed, arrowLocalDirection: [0, 1, 0] }; },
      runRuntimeSmokeTest: runRuntimeSmokeTest
    });
    selectScenario(selectedName);
    runRuntimeSmokeTest();
    document.body.dataset.viewerSmoke = "passed";
    viewerStatus.textContent = "Viewer ready";
    requestAnimationFrame(frame);
    } catch (error) {
      console.error(error);
      document.body.dataset.viewerSmoke = "failed";
      viewerStatus.hidden = false;
      viewerStatus.textContent = "Viewer startup error: " + (error.message || error);
    }
  })();
  </script>
</body>
</html>
